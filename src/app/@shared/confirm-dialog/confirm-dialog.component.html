<h1 mat-dialog-title>Attenzione</h1>
<mat-dialog-content>
  <p>{{ confirmAction }}</p>
  <p>{{ confirmDetail }}</p>
</mat-dialog-content>
<mat-dialog-actions align="center">
  <button matButton="tonal" tabindex="-1" (click)="ok()">Ok</button>
  <button matButton="tonal" tabindex="-1" (click)="close()">Annulla</button>
</mat-dialog-actions>
