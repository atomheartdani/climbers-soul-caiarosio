<h1 mat-dialog-title>Prenota posto</h1>
<mat-dialog-content>
  <p>Stai per prenotarti per questo slot:</p>
  <p>{{ opening.date }} dalle {{ opening.from }} alle {{ opening.to }}</p>
  <p>Vuoi prenotare anche per il tuo socio di arrampicata?</p>
  <mat-radio-group [(ngModel)]="reservePartner">
    <mat-radio-button labelPosition="before" tabindex="-1" [value]="true"> Si </mat-radio-button>
    <mat-radio-button labelPosition="before" tabindex="-1" [value]="false"> No </mat-radio-button>
  </mat-radio-group>
</mat-dialog-content>
<mat-dialog-actions align="center">
  <button matButton="tonal" tabindex="-1" (click)="save()" [disabled]="isProgressing">
    Ok
    @if (isProgressing) {
      <mat-icon class="icon-spin" fontIcon="refresh" />
    }
  </button>
  <button matButton="tonal" tabindex="-1" (click)="close()">Annulla</button>
</mat-dialog-actions>
